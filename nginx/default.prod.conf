server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # auth_request で oauth2-proxy に認証を委譲
    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy:4180;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location /oauth2/ {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
    }

    # Media files (MinIO proxy)
    location /media/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        rewrite ^/media/(.*)$ /maycast-media/$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
    }

    # S3 storage operations (presigned URL uploads)
    location /storage/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        client_max_body_size 500M;
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
    }

    # API
    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_email $upstream_http_x_forwarded_email;
        auth_request_set $auth_user $upstream_http_x_forwarded_user;

        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Email $auth_email;
        proxy_set_header X-Forwarded-User $auth_user;
    }

    # Frontend
    location / {
        auth_request /oauth2/auth;
        auth_request_set $auth_email $upstream_http_x_forwarded_email;
        auth_request_set $auth_user $upstream_http_x_forwarded_user;

        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Email $auth_email;
        proxy_set_header X-Forwarded-User $auth_user;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
