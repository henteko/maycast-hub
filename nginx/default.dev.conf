server {
    listen 80;
    server_name localhost;
    client_max_body_size 500M;

    # auth_request で fake-auth に認証を委譲
    location = /oauth2/auth {
        internal;
        proxy_pass http://fake-auth:4180;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # ログインページ (認証不要)
    location /oauth2/ {
        proxy_pass http://fake-auth:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Media files (MinIO proxy)
    location /media/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        rewrite ^/media/(.*)$ /maycast-media/$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
    }

    # S3 storage operations (presigned URL uploads)
    location /storage/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
    }

    # Health check (認証不要)
    location = /api/health {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_email $upstream_http_x_forwarded_email;
        auth_request_set $auth_user $upstream_http_x_forwarded_user;

        # 未認証時はログインページへリダイレクト
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Email $auth_email;
        proxy_set_header X-Forwarded-User $auth_user;
    }

    # Frontend
    location / {
        auth_request /oauth2/auth;
        auth_request_set $auth_email $upstream_http_x_forwarded_email;
        auth_request_set $auth_user $upstream_http_x_forwarded_user;

        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Email $auth_email;
        proxy_set_header X-Forwarded-User $auth_user;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
