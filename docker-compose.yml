services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - fake-auth

  fake-auth:
    build:
      context: ./packages/fake-auth
      dockerfile: Dockerfile.dev
    expose:
      - "4180"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maycast
      POSTGRES_PASSWORD: maycast
      POSTGRES_DB: maycast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maycast"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: pgsty/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost
    expose:
      - "9000"
    ports:
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: quay.io/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/maycast-media --ignore-existing
        mc anonymous set public local/maycast-media
        exit 0

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgresql://maycast:maycast@postgres:5432/maycast
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost/storage
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: maycast-media
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      PORT: "3001"
      CORS_ORIGIN: http://localhost
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    expose:
      - "5173"
    environment:
      VITE_API_URL: ""
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  pgdata:
  miniodata:
